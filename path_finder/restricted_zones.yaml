  # ── TEMPORARY ZONES ───────────────────────────────────────
  # These are examples - update dates as needed

  - name: "Example - Pune Marathon Event"
    type: temporary
    hard_block: true
    shape: polygon
    polygon:
      - [18.5200, 73.8550]
      - [18.5200, 73.8650]
      - [18.5300, 73.8650]
      - [18.5300, 73.8550]
    active_from: "2026-01-15 06:00"
    active_until: "2026-01-15 14:00"
    notes: "Temporary no-fly during marathon - example entry"

  - name: "Example - VIP Visit Buffer"
    type: temporary
    hard_block: true
    shape: circle
    center: [18.5195, 73.8554]
    radius_m: 2000
